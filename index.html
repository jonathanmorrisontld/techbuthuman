<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech But Human</title>
  <meta name="description" content="A Jonathan Morrison project. Tech that feels human." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(145deg, #f0f4ff 0%, #fce8f6 40%, #e8f4ff 70%, #f5f0ff 100%);
      background-attachment: fixed;
      color: #1e1535;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1e1535;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: #4a3878;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav-links a:hover { color: #8b5cf6; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 80px;
    }

    .hero-name {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9b7ec8;
      margin-bottom: 16px;
    }

    .hero-brand {
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(120deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-coming {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(100, 80, 150, 0.38);
      margin-top: 18px;
    }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 20px 40px;
      border-top: 0.5px solid rgba(160, 130, 210, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(100, 80, 150, 0.35);
      letter-spacing: 0.08em;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .footer-links a {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(100, 80, 150, 0.35);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s ease;
    }

    .footer-links a:hover { color: #8b5cf6; }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 10px; }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 12px; }
      footer { padding: 20px; flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Tech But Human</a>
    <ul class="nav-links">
      <li><a href="/store">store</a></li>
      <li><a href="https://fitbuthuman.com">fit but human</a></li>
      <li><a href="#">jonathan & friends</a></li>
    </ul>
  </nav>

  <section class="hero">
    <p class="hero-name">Jonathan Morrison</p>
    <h1 class="hero-brand">tech but human.</h1>
    <p class="hero-coming">coming soon...</p>
  </section>

  <footer>
    <span class="footer-copy">© 2026 Jonathan Morrison</span>
    <ul class="footer-links">
      <li><a href="https://youtube.com/tld" target="_blank">YouTube</a></li>
      <li><a href="https://instagram.com" target="_blank">Instagram</a></li>
      <li><a href="https://tldtoday.com" target="_blank">TLD</a></li>
    </ul>
  </footer>

</body>
</html>
